apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: staging

namespace: staging

resources:
- ../../walkthrough/step-4

# Components from step-4 (resource-limits-added) accumulate with anything
# declared here — Kustomize does NOT replace inherited components.
components:
  # imgproxy: off in staging by default. Uncomment for staging-side load
  # testing of the transcode pipeline.
  # - ../../components/imgproxy

configMapGenerator:
- behavior: merge
  envs:
  - config/common.env
  name: config
patches:
- path: patches/magento-web.yaml
# Re-enable alongside ../../bases/consumer in walkthrough/step-4/kustomization.yaml
# - path: patches/magento-consumer.yaml
- path: patches/ingress.yaml
