apiVersion: v1
kind: ResourceQuota
metadata:
  name: namespace-quota
spec:
  hard:
    requests.cpu: "6"
    requests.memory: 18Gi
    limits.cpu: "14"
    limits.memory: 28Gi
    count/pods: "40"
    count/services: "20"
    count/configmaps: "30"
    count/secrets: "30"
    count/persistentvolumeclaims: "10"
    requests.storage: 30Gi
