apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: production

namespace: production

resources:
- ../../walkthrough/step-4

# Production gets ProxySQL + 2 MySQL read replicas by default. Comment out
# the line below to revert to the single-primary topology (the rest of the
# component, my.cnf binlog enablement, Service swap, db-primary Service,
# auto-reverts together with the components: entry).
components:
- ../../components/proxysql

configMapGenerator:
- behavior: merge
  envs:
  - config/common.env
  name: config
patches:
- path: patches/magento-web.yaml
# Re-enable alongside ../../bases/consumer in walkthrough/step-4/kustomization.yaml
# - path: patches/magento-consumer.yaml
- path: patches/hpa.yaml
- path: patches/ingress.yaml
- path: patches/database.yaml
