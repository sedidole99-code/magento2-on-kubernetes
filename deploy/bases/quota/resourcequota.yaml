apiVersion: v1
kind: ResourceQuota
metadata:
  name: namespace-quota
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 8Gi
    limits.cpu: "5"
    limits.memory: 12Gi
    count/pods: "40"
    count/services: "20"
    count/configmaps: "30"
    count/secrets: "30"
    count/persistentvolumeclaims: "10"
    requests.storage: 30Gi
