apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: imgproxy
spec:
  minReplicas: 1
  maxReplicas: 5
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: imgproxy
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
