apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: monitoring

resources:
- servicemonitor.yaml
- prometheusrule.yaml

configMapGenerator:
- name: grafana-dashboard-magento
  files:
  - dashboards/magento-overview.json
  options:
    labels:
      grafana_dashboard: "1"
- name: grafana-dashboard-phpfpm
  files:
  - dashboards/phpfpm.json
  options:
    labels:
      grafana_dashboard: "1"
- name: grafana-dashboard-nginx
  files:
  - dashboards/nginx.json
  options:
    labels:
      grafana_dashboard: "1"
