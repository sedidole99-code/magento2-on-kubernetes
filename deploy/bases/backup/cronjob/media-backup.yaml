apiVersion: batch/v1
kind: CronJob
metadata:
  name: media-backup
spec:
  schedule: '0 3 * * *'
  jobTemplate:
    spec:
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: backup
            component: media
        spec:
          containers:
          - name: media-backup
            image: busybox@sha256:f9a104fddb33220ec80fc45a4e606c74aadf1ef7a3832eb0b05be9e90cd61f5f
            command: ["/bin/sh"]
            args:
            - -c
            - |
              set -e
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              BACKUP_DIR=/backup/media
              mkdir -p "$BACKUP_DIR"
              echo "Starting media backup: media-${TIMESTAMP}.tar.gz"
              tar -czf "$BACKUP_DIR/media-${TIMESTAMP}.tar.gz" \
                -C /var/www/html/pub media
              echo "Backup complete: media-${TIMESTAMP}.tar.gz ($(du -h "$BACKUP_DIR/media-${TIMESTAMP}.tar.gz" | cut -f1))"
              cd "$BACKUP_DIR"
              ls -1t media-*.tar.gz | tail -n +$((BACKUP_RETENTION + 1)) | xargs -r rm -f
              echo "Backups after rotation:"
              ls -lht media-*.tar.gz
            env:
            - name: BACKUP_RETENTION
              value: "7"
            volumeMounts:
            - name: backup
              mountPath: /backup
            - name: media
              mountPath: /var/www/html/pub/media
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 1Gi
          restartPolicy: Never
          volumes:
          - name: backup
            persistentVolumeClaim:
              claimName: backup
          - name: media
            persistentVolumeClaim:
              claimName: media
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  failedJobsHistoryLimit: 5
  successfulJobsHistoryLimit: 3
