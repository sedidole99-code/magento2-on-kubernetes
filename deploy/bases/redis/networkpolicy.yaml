apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow inbound connections on Redis port from Magento web, consumer, cron, and install pods
  - from:
    - podSelector:
        matchLabels:
          app: magento
          component: web
    - podSelector:
        matchLabels:
          app: magento
          component: consumer
    - podSelector:
        matchLabels:
          app: magento
          component: cron
    - podSelector:
        matchLabels:
          app: magento
          component: install
    ports:
    - protocol: TCP
      port: 6379
  egress:
  # Allow DNS resolution via kube-dns
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
