apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-magento-install
spec:
  podSelector:
    matchLabels:
      app: magento
      component: install
  policyTypes:
  - Egress
  egress:
  # magento-install -> db:3306 (MySQL)
  - to:
    - podSelector:
        matchLabels:
          app: db
    ports:
    - protocol: TCP
      port: 3306
  # magento-install -> elasticsearch:9200 (search engine setup)
  - to:
    - podSelector:
        matchLabels:
          app: elasticsearch
    ports:
    - protocol: TCP
      port: 9200
  # magento-install -> redis:6379 (cache/session config during install + wait-for-redis init)
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # magento-install -> rabbitmq:5672 (AMQP config during install + wait-for-rabbitmq init)
  - to:
    - podSelector:
        matchLabels:
          app: rabbitmq
    ports:
    - protocol: TCP
      port: 5672
  # magento-install -> varnish:6081 (cache purge during install)
  - to:
    - podSelector:
        matchLabels:
          app: varnish
    ports:
    - protocol: TCP
      port: 6081
  # DNS resolution via kube-system/kube-dns
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
