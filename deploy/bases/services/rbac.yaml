apiVersion: v1
kind: ServiceAccount
metadata:
  name: services-dashboard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: services-dashboard
rules:
- apiGroups: [""]
  resources: ["secrets", "pods", "services"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: services-dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: services-dashboard
subjects:
- kind: ServiceAccount
  name: services-dashboard
  namespace: default
