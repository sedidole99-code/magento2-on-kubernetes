apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-dashboard
spec:
  podSelector:
    matchLabels:
      app: services-dashboard
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # kubectl port-forward access
  - ports:
    - protocol: TCP
      port: 8080
  egress:
  # Kubernetes API server (collector)
  # After kube-proxy DNAT, Calico sees the real endpoint port, not the Service port (443).
  # Common API-server ports: 8443 (minikube), 6443 (kubeadm/Kind), 443 (managed K8s).
  - ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 6443
    - protocol: TCP
      port: 8443
  # DNS resolution
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
