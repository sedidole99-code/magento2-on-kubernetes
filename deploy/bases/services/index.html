<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>m2kube — Dev Services</title>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8; --green: #4ade80; --yellow: #fbbf24; --red: #f87171; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: var(--bg); color: var(--text); padding: 0; line-height: 1.6; }

  /* Nav */
  nav { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .nav-brand { font-weight: 700; font-size: 1rem; color: var(--accent); padding: 0.75rem 0; margin-right: 2rem; }
  .nav-tabs { display: flex; gap: 0; }
  .nav-tab { padding: 0.75rem 1.25rem; color: var(--muted); text-decoration: none; font-size: 0.85rem; border-bottom: 2px solid transparent; transition: all 0.2s; cursor: pointer; }
  .nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-tab.disabled { color: var(--border); cursor: default; }
  .nav-tab.disabled:hover { background: none; color: var(--border); }
  .nav-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .nav-dot.online { background: var(--green); }
  .nav-dot.offline { background: var(--border); }
  .nav-right { display: flex; align-items: center; gap: 1rem; }
  .nav-status { font-size: 0.75rem; color: var(--muted); }

  /* Content */
  .content { padding: 2rem; }
  h1 { font-size: 1.2rem; margin-bottom: 0.25rem; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }

  .btn { background: var(--card); border: 1px solid var(--border); color: var(--accent); padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-family: inherit; transition: border-color 0.2s; }
  .btn:hover { border-color: var(--accent); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 1.5rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; transition: opacity 0.3s; }
  .card.unavailable { opacity: 0.4; }
  .card h2 { font-size: 1rem; color: var(--accent); margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
  .card.unavailable h2 { color: var(--muted); }
  table { width: 100%; border-collapse: collapse; }
  td, th { padding: 0.3rem 0; font-size: 0.85rem; vertical-align: top; text-align: left; }
  td:first-child, th:first-child { color: var(--muted); white-space: nowrap; padding-right: 1rem; width: 40%; }
  td:last-child { word-break: break-all; }
  .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8rem; }

  .cmd { background: #0f172a; border: 1px solid var(--border); border-radius: 4px; padding: 0.5rem 0.75rem; font-size: 0.8rem; font-family: monospace; color: var(--green); margin-top: 0.5rem; display: block; cursor: pointer; position: relative; }
  .cmd:hover { border-color: var(--accent); }
  .cmd::after { content: 'click to copy'; position: absolute; right: 0.5rem; top: 0.5rem; font-size: 0.65rem; color: var(--muted); }
  .cmd.copied::after { content: 'copied!'; color: var(--green); }

  .copyable { cursor: pointer; border-bottom: 1px dashed var(--border); }
  .copyable:hover { color: var(--accent); }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .badge { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
  .badge-green { background: rgba(74,222,128,0.15); color: var(--green); }
  .badge-yellow { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .badge-red { background: rgba(248,113,113,0.15); color: var(--red); }
  .badge-gray { background: rgba(148,163,184,0.15); color: var(--muted); }

  .pods-section { margin-top: 2rem; }
  .pods-section h2 { font-size: 1rem; color: var(--accent); margin-bottom: 1rem; }
  .pods-table { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; border-collapse: separate; border-spacing: 0; overflow: hidden; }
  .pods-table th { background: var(--bg); padding: 0.6rem 1rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .pods-table td { padding: 0.5rem 1rem; border-top: 1px solid var(--border); font-size: 0.85rem; }
  .pods-table td:first-child, .pods-table th:first-child { color: var(--text); width: auto; }

  .loading { color: var(--muted); text-align: center; padding: 3rem; font-size: 1rem; }
  .env-label { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-left: 0.5rem; }
  .env-default { background: rgba(56,189,248,0.15); color: var(--accent); }
  .env-staging { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .env-production { background: rgba(248,113,113,0.15); color: var(--red); }

  @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } .content { padding: 1rem; } }
</style>
</head>
<body>

<nav>
  <div style="display:flex;align-items:center">
    <span class="nav-brand">m2kube</span>
    <div class="nav-tabs" id="nav-tabs"></div>
  </div>
  <div class="nav-right">
    <span class="nav-status" id="nav-status"></span>
    <button class="btn" id="refresh-btn" onclick="refreshAll()">Refresh</button>
  </div>
</nav>

<div class="content">
  <div id="env-header"></div>
  <div class="grid" id="grid"><div class="loading">Loading...</div></div>
  <div class="pods-section" id="pods-section"></div>
</div>

<script>
const ENVS = ['default', 'staging', 'production'];
const ENV_LABELS = { default: 'Dev', staging: 'Stage', production: 'Prod' };
let data = {};  // { default: {...}, staging: {...}, production: {...} }
let activeEnv = 'default';
let refreshTimer = null;

// ========================================================================= //
// Fetch
// ========================================================================= //

async function fetchEnv(ns) {
  try {
    const r = await fetch('/data/env-' + ns + '.json?t=' + Date.now());
    if (r.ok) data[ns] = await r.json();
  } catch(e) {}
}

async function refreshAll() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true; btn.textContent = 'Refreshing...';
  await Promise.all(ENVS.map(fetchEnv));
  renderNav();
  render();
  btn.disabled = false; btn.textContent = 'Refresh';
}

function switchEnv(ns) {
  if (ns === 'backups') { window.location.href = '/backups.html'; return; }
  activeEnv = ns;
  renderNav();
  render();
}

// ========================================================================= //
// Helpers
// ========================================================================= //

function esc(s) { if (!s) return 'n/a'; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function timeAgo(iso) {
  if (!iso) return 'never';
  const sec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (sec < 10) return 'just now';
  if (sec < 60) return sec + 's ago';
  if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
  return Math.floor(sec / 3600) + 'h ago';
}

function copyText(text, el) {
  navigator.clipboard.writeText(text).then(() => {
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 1500);
  });
}

function mono(v) { return '<span class="mono">' + esc(v) + '</span>'; }
function copyable(v) {
  const e = esc(v);
  return '<span class="mono copyable" onclick="navigator.clipboard.writeText(\'' + e.replace(/'/g, "\\'") + '\')" title="Click to copy">' + e + '</span>';
}
function cmd(text) {
  return '<code class="cmd" onclick="copyText(\'' + text.replace(/'/g, "\\'") + '\', this)">' + esc(text) + '</code>';
}
function link(url) { return '<a href="' + url + '" target="_blank">' + esc(url) + '</a>'; }
function row(label, value) { return '<tr><td>' + esc(label) + '</td><td>' + value + '</td></tr>'; }

function card(title, rows, footer, available) {
  const cls = available === false ? ' unavailable' : '';
  const statusBadge = available === false ? ' <span class="badge badge-gray">not deployed</span>' : '';
  let h = '<div class="card' + cls + '"><h2>' + esc(title) + statusBadge + '</h2><table>';
  for (const r of rows) h += r;
  h += '</table>';
  if (footer && available !== false) h += footer;
  h += '</div>';
  return h;
}

function badge(text, color) {
  return '<span class="badge badge-' + color + '">' + esc(text) + '</span>';
}

function statusColor(s) {
  if (s === 'Running' || s === 'Completed' || s === 'Succeeded') return 'green';
  if (s === 'Pending' || s === 'ContainerCreating' || s === 'PodInitializing') return 'yellow';
  return 'red';
}

function isAvailable(val) { return val && val !== 'n/a'; }

// ========================================================================= //
// Nav
// ========================================================================= //

function renderNav() {
  let tabs = '';
  for (const ns of ENVS) {
    const d = data[ns];
    const online = d?.exists && d?.has_magento;
    const active = ns === activeEnv ? ' active' : '';
    const dotCls = online ? 'online' : 'offline';
    tabs += '<a class="nav-tab' + active + '" onclick="switchEnv(\'' + ns + '\')">';
    tabs += '<span class="nav-dot ' + dotCls + '"></span>';
    tabs += ENV_LABELS[ns];
    tabs += '</a>';
  }
  // Backups tab
  tabs += '<a class="nav-tab" href="/backups.html"><span class="nav-dot online"></span>Backups</a>';
  document.getElementById('nav-tabs').innerHTML = tabs;

  // Status
  const d = data[activeEnv];
  const age = d ? timeAgo(d.updated) : 'never';
  document.getElementById('nav-status').textContent = 'Updated: ' + age;
}

// ========================================================================= //
// Render
// ========================================================================= //

function render() {
  const d = data[activeEnv];
  if (!d) {
    document.getElementById('grid').innerHTML = '<div class="loading">No data for ' + ENV_LABELS[activeEnv] + ' yet...</div>';
    document.getElementById('pods-section').innerHTML = '';
    document.getElementById('env-header').innerHTML = '';
    return;
  }

  if (!d.exists) {
    document.getElementById('grid').innerHTML = '<div class="loading">Namespace <strong>' + activeEnv + '</strong> does not exist.<br>Deploy with: <code>make step-4-deploy ' + (activeEnv === 'default' ? 'dev' : activeEnv === 'staging' ? 'stage' : 'prod') + '</code></div>';
    document.getElementById('pods-section').innerHTML = '';
    document.getElementById('env-header').innerHTML = '';
    return;
  }

  const envClass = 'env-' + activeEnv;
  document.getElementById('env-header').innerHTML =
    '<h1>' + ENV_LABELS[activeEnv] + ' Environment <span class="env-label ' + envClass + '">' + activeEnv + '</span></h1>' +
    '<p class="subtitle">Pods: ' + (d.pods_running || 0) + '/' + (d.pods_total || 0) + ' running</p>';

  const svc = d.services || {};
  let html = '';

  // Magento
  const hasMagento = d.has_magento;
  if (d.magento) {
    const m = d.magento;
    html += card('Magento Storefront', [
      row('Frontend URL', link('https://' + (activeEnv === 'staging' ? 'staging.magento.test' : activeEnv === 'production' ? 'magento.example.com' : 'magento.test') + '/')),
      row('Admin URL', link('https://' + (activeEnv === 'staging' ? 'staging.magento.test' : activeEnv === 'production' ? 'magento.example.com' : 'magento.test') + '/' + (m.admin_uri || 'admin'))),
      row('Admin User', copyable(m.admin_user)),
      row('Admin Password', copyable(m.admin_password)),
      row('Admin Email', mono(m.admin_email)),
      row('Image', mono(m.image)),
      row('Service', mono('magento-web (' + (svc.magento_web || 'n/a') + ')')),
    ], null, hasMagento);
  }

  // Database
  html += card('Database (Percona)', [
    row('Host', mono('db:3306')),
    row('Service', mono(svc.db || 'n/a')),
    row('Database', copyable(d.database?.name)),
    row('User', copyable(d.database?.user)),
    row('Password', copyable(d.database?.password)),
    row('Root Password', copyable(d.database?.root_password)),
    row('Image', mono(d.database?.image)),
  ], cmd('kubectl port-forward svc/db 3306:3306' + (activeEnv !== 'default' ? ' -n ' + activeEnv : '')),
  isAvailable(svc.db));

  // Elasticsearch
  html += card('Elasticsearch (Search)', [
    row('Host', mono('elasticsearch:9200')),
    row('Service', mono(svc.elasticsearch || 'n/a')),
    row('Security', badge('disabled', 'yellow')),
    row('Image', mono(d.elasticsearch?.image)),
  ], cmd('kubectl port-forward svc/elasticsearch 9200:9200' + (activeEnv !== 'default' ? ' -n ' + activeEnv : '')),
  isAvailable(svc.elasticsearch));

  // Redis
  html += card('Redis', [
    row('Host', mono('redis:6379')),
    row('Service', mono(svc.redis || 'n/a')),
    row('DB 0', 'Cache'),
    row('DB 1', 'Full Page Cache'),
    row('DB 2', 'Sessions'),
    row('Image', mono(d.redis?.image)),
  ], cmd('kubectl port-forward svc/redis 6379:6379' + (activeEnv !== 'default' ? ' -n ' + activeEnv : '')),
  isAvailable(svc.redis));

  // Varnish
  html += card('Varnish', [
    row('Host', mono('varnish:8080')),
    row('Service', mono(svc.varnish || 'n/a')),
    row('Cache Size', '512 MB'),
    row('Admin Port', mono('6081')),
    row('Image', mono(d.varnish?.image)),
  ], null, isAvailable(svc.varnish));

  // RabbitMQ
  html += card('RabbitMQ', [
    row('Host', mono('rabbitmq:5672')),
    row('Management UI', link('http://localhost:15672')),
    row('Service', mono(svc.rabbitmq || 'n/a')),
    row('Username', copyable(d.rabbitmq?.user || 'n/a')),
    row('Password', copyable(d.rabbitmq?.password || 'n/a')),
    row('Virtual Host', mono('/')),
    row('Image', mono(d.rabbitmq?.image)),
  ], cmd('kubectl port-forward svc/rabbitmq 15672:15672' + (activeEnv !== 'default' ? ' -n ' + activeEnv : '')),
  isAvailable(svc.rabbitmq));

  // Only show infra services for default namespace
  if (activeEnv === 'default') {
    // Grafana
    html += card('Grafana', [
      row('URL', link('http://localhost:3000')),
      row('Service', mono(svc.grafana || 'n/a')),
      row('Username', copyable('admin')),
      row('Password', copyable('admin')),
    ], cmd('kubectl port-forward svc/kube-prometheus-stack-grafana 3000:80'),
    isAvailable(svc.grafana));

    // Prometheus
    html += card('Prometheus', [
      row('URL', link('http://localhost:9090')),
      row('Service', mono(svc.prometheus || 'n/a')),
    ], cmd('kubectl port-forward svc/kube-prometheus-stack-prometheus 9090:9090'),
    isAvailable(svc.prometheus));

    // Kibana
    html += card('Kibana', [
      row('URL', link('http://localhost:5601')),
      row('Service', mono(svc.kibana || 'n/a')),
      row('Username', copyable('elastic')),
      row('Password', copyable(d.kibana?.es_password || 'n/a')),
      row('ES Host', mono('elasticsearch-master:9200')),
    ], cmd('kubectl port-forward svc/kibana-kibana 5601:5601'),
    isAvailable(svc.kibana));

    // Services Dashboard
    html += card('Services Dashboard', [
      row('URL', link('http://localhost:8080')),
      row('Service', mono(svc.services_dashboard || 'n/a')),
    ], cmd('kubectl port-forward svc/services-dashboard 8080:8080'),
    isAvailable(svc.services_dashboard));

    // Kubernetes Dashboard
    html += card('Kubernetes Dashboard', [
      row('URL', '<a href="http://127.0.0.1:9091/api/v1/namespaces/kubernetes-dashboard/services/http:kubernetes-dashboard:/proxy/" target="_blank">http://127.0.0.1:9091/...proxy/</a>'),
      row('Service', mono(d.k8s_dashboard_svc || 'n/a')),
    ], cmd('minikube dashboard --port=9091'),
    isAvailable(d.k8s_dashboard_svc));

    // Helm releases
    if (d.helm_releases?.length) {
      const rows = d.helm_releases.map(r => row(r.name, badge('deployed', 'green')));
      html += card('Helm Releases', rows);
    }
  }

  document.getElementById('grid').innerHTML = html || '<div class="loading">No services found.</div>';
  renderPods();
}

function renderPods() {
  const el = document.getElementById('pods-section');
  const d = data[activeEnv];
  if (!d?.pods?.length) { el.innerHTML = ''; return; }

  let h = '<h2>Pod Status</h2><table class="pods-table">';
  h += '<tr><th>Name</th><th>Ready</th><th>Status</th><th>Restarts</th><th>Age</th></tr>';
  for (const p of d.pods) {
    h += '<tr>';
    h += '<td class="mono">' + esc(p.name) + '</td>';
    h += '<td>' + esc(p.ready) + '</td>';
    h += '<td>' + badge(p.status, statusColor(p.status)) + '</td>';
    h += '<td>' + esc(p.restarts) + '</td>';
    h += '<td>' + esc(p.age) + '</td>';
    h += '</tr>';
  }
  h += '</table>';
  el.innerHTML = h;
}

// ========================================================================= //
// Init
// ========================================================================= //

refreshAll();
setInterval(refreshAll, 30000);
setInterval(() => {
  const d = data[activeEnv];
  if (d) document.getElementById('nav-status').textContent = 'Updated: ' + timeAgo(d.updated);
}, 10000);
</script>
</body>
</html>
