apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-magento-consumer
spec:
  podSelector:
    matchLabels:
      app: magento
      component: consumer
  policyTypes:
  - Egress
  egress:
  # consumer -> db:3306 (MySQL database access)
  - to:
    - podSelector:
        matchLabels:
          app: db
    ports:
    - protocol: TCP
      port: 3306
  # consumer -> rabbitmq:5672 (AMQP message consumption)
  - to:
    - podSelector:
        matchLabels:
          app: rabbitmq
    ports:
    - protocol: TCP
      port: 5672
  # consumer -> redis-cache / redis-page-cache / redis-sessions on 6379 (cache and session storage)
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # consumer -> elasticsearch:9200 (search indexing)
  - to:
    - podSelector:
        matchLabels:
          app: elasticsearch
    ports:
    - protocol: TCP
      port: 9200
  # consumer -> magento-web:8080 (init container wait-for-web health check)
  - to:
    - podSelector:
        matchLabels:
          app: magento
          component: web
    ports:
    - protocol: TCP
      port: 8080
  # DNS resolution via kube-dns
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
