apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: step-3

resources:
- ../step-2
- ../../bases/varnish


configMapGenerator:
- behavior: merge
  envs:
  - config/additional.env
  name: additional
patches:
- path: patches/ingress.json
  target:
    group: networking.k8s.io
    kind: Ingress
    name: main
    version: v1
