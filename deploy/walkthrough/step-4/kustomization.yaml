apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: step-4

resources:
- ../step-3
- ../../bases/backup
- ../../bases/rabbitmq
# Dedicated consumer Deployment is disabled by default.
# Queue consumers run via magento-cron's cron_consumers_runner using the
# CRON_CONSUMERS_LIST in config/additional.env. Uncomment the line below to
# re-enable the persistent worker pod (and also uncomment the per-env patches
# in deploy/overlays/*/kustomization.yaml).
# - ../../bases/consumer


components:
- ../../components/resource-limits-added
# Read replicas via ProxySQL are off in step-4 by default. Production
# overlay enables them. To enable for staging/dev/test/kind, add
# `../../components/proxysql` to that overlay's `components:` list. Note
# this ships 2 ProxySQL pods + 2 MySQL replicas; minikube needs ~2 GiB
# additional memory and ~25 GiB disk.
# - ../../components/proxysql

configMapGenerator:
- behavior: merge
  envs:
  - config/additional.env
  name: additional
patches:
- path: patches/rabbitmq.yaml
