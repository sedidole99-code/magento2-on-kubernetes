apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
metadata:
  name: proxysql

# ProxySQL + MySQL read-replica stack. Opt-in component.
#
# When pulled in (via `components: [..]` in an overlay), this:
#   1. Extends the primary's mycnf ConfigMap to enable GTID/binlogs/clone.
#      The kustomize hash change auto-rolls the primary StatefulSet — first
#      apply is a one-time 30-60s blip; deploy MUST run as
#      `make deploy-maintenance prod` to avoid mixed PHP-FPM routing.
#   2. Adds a 2-replica db-replica StatefulSet that bootstraps each pod
#      from the primary via the MySQL 8.0 CLONE plugin.
#   3. Adds a 2-replica ProxySQL StatefulSet in cluster mode (no SPOF).
#   4. Patches the existing `db` Service selector to app=proxysql,
#      targetPort=6033 — Magento's existing DB_HOST=db transparently routes
#      through ProxySQL.
#   5. Adds a new `db-primary` Service that the db-backup CronJob and
#      operators use for primary-only work.
#
# See README.md for opt-in steps, the operator-habit gotcha, and tuning.

resources:
# Order matters for first-time apply: bootstrap the monitor + clone + replica
# users on the primary BEFORE the replicas attempt to clone, BEFORE ProxySQL
# tries to log in as `monitor`. Kustomize doesn't enforce apply order, but
# kubectl apply -f - applies resources in file order within each kind, and
# Job/StatefulSet have implicit dependencies that resolve via init-container
# wait loops anyway.
- monitor/credentials.yaml
- replica/credentials.yaml
- proxysql/credentials.yaml
- primary-bootstrap/job.yaml
- replica/statefulset.yaml
- replica/service.yaml
- replica/pdb.yaml
- replica/networkpolicy.yaml
- proxysql/statefulset.yaml
- proxysql/service.yaml
- proxysql/pdb.yaml
- proxysql/networkpolicy.yaml
- patches/db-primary-service.yaml
- reconcile/users-reload-job.yaml

# ConfigMaps generated by the component.
#
# `mycnf` — replace the base-generated ConfigMap with the extended file that
# enables GTID/binlogs/clone-plugin. Hash change triggers the primary
# StatefulSet rollout automatically.
#
# `db-replica-mycnf` — new ConfigMap consumed by the db-replica StatefulSet.
# `db-replica-scripts` — bootstrap-replica.sh script for the init container.
# `proxysql-cnf` — ProxySQL bootstrap config (rendered with secrets at boot).
configMapGenerator:
- name: mycnf
  behavior: replace
  files:
  - my.cnf=patches/primary-my.cnf
- name: db-replica-mycnf
  files:
  - my.cnf=replica/config/my.cnf
- name: db-replica-scripts
  files:
  - bootstrap-replica.sh=replica/scripts/bootstrap-replica.sh
- name: proxysql-cnf
  files:
  - proxysql.cnf=proxysql/config/proxysql.cnf

# Strategic-merge patches against existing base resources.
patches:
- path: patches/db-service.yaml
  target:
    kind: Service
    name: db
- path: patches/allow-db-networkpolicy.yaml
  target:
    kind: NetworkPolicy
    name: allow-db
- path: patches/db-backup-cronjob.yaml
  target:
    kind: CronJob
    name: db-backup
- path: patches/allow-db-backup-egress.yaml
  target:
    kind: NetworkPolicy
    name: allow-db-backup
