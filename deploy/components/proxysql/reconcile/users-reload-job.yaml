---
# Manual on-demand Job. Trigger after database-credentials rotates:
#
#   kubectl -n <ns> create job --from=job/proxysql-users-reload-template \
#     proxysql-users-reload-$(date +%s)
#
# Targets proxysql-0.proxysql-admin (a fixed cluster member, NOT the
# load-balanced proxysql Service). ProxySQL Cluster sync is eventually-
# consistent and last-writer-wins — hitting the load-balanced Service hashes
# to a random pod, and a brief partition could leave the unpicked pod
# without the new credentials. Targeting the lowest-ordinal pod gives a
# stable "leader" for admin writes; the second pod picks it up via cluster
# sync within a heartbeat (cluster_check_interval_ms=200).
apiVersion: batch/v1
kind: Job
metadata:
  name: proxysql-users-reload-template
  labels:
    app: proxysql-users-reload
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: proxysql-users-reload
    spec:
      restartPolicy: OnFailure
      containers:
      - name: reload
        image: proxysql/proxysql:2.7.1@sha256:cd866337812d98b9df83abeae9f51728f7cd5b1cdd97e788a1200452d9b7e075
        command: ["/bin/bash"]
        args:
        - -c
        - |
          set -euo pipefail
          # On first-deploy this Job is applied alongside the proxysql STS, so
          # proxysql-0.proxysql-admin may not have a DNS record yet. Wait up
          # to ~5 min for the admin port to accept connections before giving
          # up (Job backoffLimit takes over from there).
          #
          # Auth as `cluster`, NOT `admin`. ProxySQL restricts the `admin`
          # account to local-only logins; remote TCP yields ERROR 1040 "User
          # 'admin' can only connect locally". The `cluster` account is the
          # same one ProxySQL pods use for cluster sync and is TCP-allowed.
          for i in $(seq 1 60); do
            if mysql -h proxysql-0.proxysql-admin -P 6032 \
                     -u cluster -p"$CLUSTER_PASSWORD" --connect-timeout=3 \
                     -e 'SELECT 1' >/dev/null 2>&1; then
              echo "proxysql-0 admin reachable after ${i} attempt(s)"
              break
            fi
            echo "waiting for proxysql-0.proxysql-admin:6032 (${i}/60)"
            sleep 5
          done
          # ProxySQL's admin DB is SQLite — use INSERT OR REPLACE, not the
          # MySQL-only ON DUPLICATE KEY UPDATE which fails with a syntax error.
          mysql -h proxysql-0.proxysql-admin -P 6032 \
                -u cluster -p"$CLUSTER_PASSWORD" --batch <<SQL
          INSERT OR REPLACE INTO mysql_users(username, password, default_hostgroup, active, transaction_persistent, max_connections)
            VALUES('$DB_USER', '$DB_PASS', 0, 1, 1, 1000);
          LOAD MYSQL USERS TO RUNTIME;
          SAVE MYSQL USERS TO DISK;
          SELECT 'mysql_users after reload:' AS info;
          SELECT username, default_hostgroup, active FROM runtime_mysql_users;
          SQL
          echo "Cluster sync will propagate to proxysql-1 within cluster_check_interval_ms=200ms"
        env:
        - name: CLUSTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: proxysql-credentials
              key: CLUSTER_PASSWORD
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: MYSQL_USER
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: MYSQL_PASSWORD
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
# Egress for users-reload Job pods: reach proxysql-0:6032 + DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-proxysql-users-reload
spec:
  podSelector:
    matchLabels:
      app: proxysql-users-reload
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: proxysql
    ports:
    - protocol: TCP
      port: 6032
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
