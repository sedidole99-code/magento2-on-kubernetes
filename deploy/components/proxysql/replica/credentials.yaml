---
# Replica-side credentials. Two users:
#
#   REPLICA_PASSWORD — for replica_user@'%' on the primary, granted REPLICATION
#     SLAVE. Used in the CHANGE REPLICATION SOURCE TO ... call run by the
#     bootstrap-replica.sh init script after CLONE INSTANCE completes.
#
#   CLONE_PASSWORD — for clone_user@'%' on the primary, granted BACKUP_ADMIN.
#     Used by the recipient session (running as root with CLONE_ADMIN locally)
#     when it issues CLONE INSTANCE FROM 'clone_user'@'db-primary':3306
#     IDENTIFIED BY '$CLONE_PASSWORD' on first replica startup.
#
# Both users are created on the primary by primary-bootstrap/job.yaml.
apiVersion: "secretgenerator.mittwald.de/v1alpha1"
kind: "StringSecret"
metadata:
  name: db-replica-credentials
spec:
  forceRegenerate: false
  fields:
    - fieldName: "REPLICA_PASSWORD"
      encoding: "base64"
      length: "20"
    - fieldName: "CLONE_PASSWORD"
      encoding: "base64"
      length: "20"
