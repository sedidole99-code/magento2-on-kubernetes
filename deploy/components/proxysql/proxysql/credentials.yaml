---
# ProxySQL admin + cluster credentials.
#
#   ADMIN_PASSWORD — for the local admin@127.0.0.1 user that talks to the
#     ProxySQL admin interface on 6032. The users-reload Job and any operator
#     reconcile commands authenticate with this.
#
#   CLUSTER_PASSWORD — for the cluster sync user (admin variables
#     admin-cluster_username / admin-cluster_password). ProxySQL pods use this
#     to read each other's runtime tables and converge state in cluster mode.
#
# MONITOR_PASSWORD lives in monitor-credentials (shared with the primary
# bootstrap Job) — see monitor/credentials.yaml.
apiVersion: "secretgenerator.mittwald.de/v1alpha1"
kind: "StringSecret"
metadata:
  name: proxysql-credentials
spec:
  forceRegenerate: false
  fields:
    - fieldName: "ADMIN_PASSWORD"
      encoding: "base64"
      length: "20"
    - fieldName: "CLUSTER_PASSWORD"
      encoding: "base64"
      length: "20"
