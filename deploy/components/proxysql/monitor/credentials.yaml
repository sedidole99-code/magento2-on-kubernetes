---
# Shared monitor credentials.
#
# Consumed by two parties that must agree on the same password:
#   - ProxySQL pods (proxysql/statefulset.yaml) — envFrom mounts MONITOR_USER and
#     MONITOR_PASSWORD. ProxySQL admin variables mysql-monitor_username /
#     mysql-monitor_password are populated from these env vars at boot.
#   - db-primary-bootstrap Job (primary-bootstrap/job.yaml) — runs
#     CREATE USER IF NOT EXISTS 'monitor'@'%' IDENTIFIED BY '$MONITOR_PASSWORD'
#     against the primary so ProxySQL's monitor module can log in.
#
# If these two credentials drift, every monitor ping fails with ERROR 1045 and
# ProxySQL marks all backends OFFLINE_HARD. Single Secret avoids that class of
# bug entirely.
apiVersion: "secretgenerator.mittwald.de/v1alpha1"
kind: "StringSecret"
metadata:
  name: monitor-credentials
spec:
  forceRegenerate: false
  data:
    MONITOR_USER: "monitor"
  fields:
    - fieldName: "MONITOR_PASSWORD"
      encoding: "base64"
      length: "20"
