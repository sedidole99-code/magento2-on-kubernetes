apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
metadata:
  name: imgproxy

resources:
- ../../bases/imgproxy

configMapGenerator:
- name: nginx
  behavior: replace
  files:
  - default.conf=patches/nginx-default.conf
  - magento2.conf=patches/nginx-magento2.conf

patches:
- path: patches/allow-magento-web-egress.yaml
  target:
    kind: NetworkPolicy
    name: allow-magento-web
